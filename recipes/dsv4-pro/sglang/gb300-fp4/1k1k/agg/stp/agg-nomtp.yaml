# DeepSeek-V4-Pro aggregated mode on GB300 (1 node 4 GPU, TP=4) - NO MTP
# Baseline for comparison against MTP-enabled run (1567486)
name: "dsv4-pro-gb300-agg-nomtp-1k1k-official"

slurm:
  partition: gb300
  time_limit: "4:00:00"

model:
  path: "dsv4-pro"
  container: "dsv4-grace-blackwell"
  precision: "fp4"

frontend:
  type: sglang

resources:
  gpu_type: "gb300"
  gpus_per_node: 4
  agg_nodes: 1
  agg_workers: 1

backend:
  type: sglang

  aggregated_environment:
    PYTHONUNBUFFERED: "1"
    SGLANG_JIT_DEEPGEMM_PRECOMPILE: "0"
    SGLANG_JIT_DEEPGEMM_FAST_WARMUP: "1"
    SGLANG_MOONCAKE_CUSTOM_MEM_POOL: "True"
    NCCL_MNNVL_ENABLE: "1"
    NCCL_CUMEM_ENABLE: "1"

  sglang_config:
    aggregated:
      served-model-name: "deepseek-ai/DeepSeek-V4-Pro"
      model-path: "/model/"
      trust-remote-code: true

      tensor-parallel-size: 4

      # No MTP - pure MXFP4 MoE baseline
      moe-runner-backend: "flashinfer_mxfp4"
      chunked-prefill-size: 4096
      disable-flashinfer-autotune: true
      mem-fraction-static: 0.78

      context-length: 2200
      cuda-graph-max-bs: 1024
      max-running-requests: 1024
      disable-radix-cache: true
      decode-log-interval: 1
      stream-interval: 50

benchmark:
  type: "sa-bench"
  isl: 1024
  osl: 1024
  random_range_ratio: 0.8
  concurrencies: "1x2x4x8x16x32x64"
  req_rate: "inf"
  use_chat_template: false

name: "nemotron-super-120b-sglang-agg-b200-tp1-8k1k"

model:
  path: "hf:nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4"
  container: "nvcr.io/nvidia/ai-dynamo/sglang-runtime:1.2.0-sglang-deepseek-v4-b200-dev.1"
  precision: "fp4"

dynamo:
  install: false

resources:
  gpu_type: "b200"
  gpus_per_node: 1
  agg_nodes: 1
  agg_workers: 1
  gpus_per_agg: 1

frontend:
  type: dynamo
  enable_multiple_frontends: false

backend:
  type: sglang

  aggregated_environment:
    PYTHONUNBUFFERED: "1"
    DYN_HEALTH_CHECK_ENABLED: "false"

  sglang_config:
    aggregated:
      served-model-name: "nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4"
      tensor-parallel-size: 1
      trust-remote-code: true
      mem-fraction-static: 0.85
      context-length: 9216
      max-running-requests: 256
      cuda-graph-max-bs: 256

benchmark:
  type: "sa-bench"
  isl: 8192
  osl: 1024
  concurrencies: "256"
  req_rate: "inf"
  random_range_ratio: 0.8
  num_prompts_mult: 10
  num_warmup_mult: 2
